<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 모둠 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; margin-top: 30px; background-color: #f5f7fa; color: #333; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px;}
        input, textarea { padding: 10px; font-size: 16px; margin: 5px; }
        .hidden { display: none !important; }
        
        #host-display-text { font-size: 4.5em; margin: 5px 0 20px 0; word-break: keep-all; font-weight: 900; color: #1a237e; min-height: 1.5em; }
        
        @keyframes cinematicReveal {
            0% { transform: scale(0.4); opacity: 0; filter: blur(15px); }
            65% { transform: scale(1.08); filter: blur(0px); }
            85% { transform: scale(0.96); }
            100% { transform: scale(1); opacity: 1; }
        }
        .reveal-animation {
            animation: cinematicReveal 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        .team-box { border: 2px solid #333; margin: 10px; padding: 10px; display: inline-block; vertical-align: top; width: 240px; border-radius: 10px; background-color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .slot { width: 100%; height: 65px; border: 1px dashed #aaa; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-direction: column; box-sizing: border-box; padding: 5px; background-color: #fafafa; }
        .player-badge { width: 90%; height: 80%; background-color: #2196F3; color: white; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: grab; font-weight: bold; font-size: 14px; }
        .player-badge:active { cursor: grabbing; }
        
        .ans-name { font-size: 11px; color: #333; margin-bottom: 3px; font-weight: bold; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .ans-text { font-size: 14px; font-weight: bold; word-break: keep-all; }

        .score-btn { width: 18px; height: 18px; padding: 0; margin: 0 1px; font-size: 12px; font-weight: bold; background-color: #607D8B; color: white; border: none; border-radius: 3px; line-height: 18px; }
        .score-btn:hover { background-color: #FF9800; }
        .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; background-color: #f1f1f1; padding: 5px 10px; border-radius: 5px;}
        .team-header h3 { margin: 0; font-size: 16px; }

        #cute-timer-ui { margin-top: 30px; }
        #cute-timer-text { font-size: 2em; font-weight: bold; color: #ff9800; margin-bottom: 10px; transition: color 0.3s; }
        .bar-bg { width: 80%; max-width: 600px; height: 35px; background-color: #eee; border-radius: 20px; margin: 0 auto; overflow: hidden; border: 3px solid #ddd; position: relative; }
        .bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); transition: width 1s linear, background-color 0.5s; border-radius: 20px; }
        
        .shake { animation: shake 0.4s infinite; color: #e53935 !important; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
    </style>
</head>
<body>
    <h1>🎯 실시간 단답형 퀴즈 게임</h1>

    <div id="intro-screen">
        <button onclick="showScreen('host-screen')" style="font-size: 20px; padding: 15px 30px;">👨‍🏫 출제자로 게임 열기</button>
    </div>

    <div id="host-screen" class="hidden">
        <div id="host-setup" style="border: 2px dashed #4CAF50; padding: 20px; margin-bottom: 20px;">
            <h3>⚙️ 퀴즈 설정</h3>
            모둠 개수: <input type="number" id="setup-teams" value="4" min="1" style="width: 60px;"> 개 <br><br>
            문제 입력 (엔터키로 줄바꿈. 최대 30개):<br>
            <textarea id="setup-questions" rows="6" style="width: 80%;"></textarea><br>
            <button onclick="createCustomGame()" style="background-color: #2196F3;">설정 완료 및 방 열기</button>
        </div>

        <button id="next-btn" onclick="nextState()" class="hidden" style="background-color: #ff9800; padding: 15px 30px; font-weight: bold; font-size: 18px;">게임 시작 / 다음 화면 ➡️</button>

        <div id="host-lobby" class="hidden">
            <div id="qr-code-display" style="margin: 20px 0;"></div>
            <h3>👥 참가자 대기 명단 (이름을 드래그해서 자리를 바꿀 수 있습니다)</h3>
            <div id="lobby-grid-container"></div>
        </div>
        
        <div id="host-game-view" class="hidden">
            <h1 id="host-display-text"></h1>
            
            <div id="cute-timer-ui" class="hidden">
                <div id="cute-timer-text"></div>
                <div class="bar-bg">
                    <div id="cute-bar-fill" class="bar-fill"></div>
                </div>
            </div>

            <div id="host-results-view"></div>
        </div>
    </div>

    <div id="player-screen" class="hidden">
        <div id="player-lobby">
            <input type="number" id="team-num" placeholder="모둠 번호 (예: 1)"><br>
            <input type="text" id="player-name" placeholder="참가자 이름"><br>
            <button onclick="joinGame()">입장하기</button>
            <h3 id="join-status" style="color: green;"></h3>
        </div>

        <div id="player-game-view" class="hidden">
            <h2 id="player-status-text">호스트의 진행을 기다려주세요...</h2>
            <div id="answer-area" class="hidden">
                <input type="text" id="player-answer" placeholder="정답을 입력하세요" style="font-size: 20px; width: 80%;">
                <br><button onclick="submitAnswer()" style="font-size: 20px; padding: 15px 40px; background-color: #e91e63;">제출하기</button>
                <p id="submit-status" style="color: blue; font-weight: bold; font-size: 18px;"></p>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let totalTeamsConfig = 4; 
        let countdownInterval = null; 

        // 오디오 관련 설정
        const bgmList = ['/bgm1.mp3', '/bgm2.mp3', '/bgm3.mp3']; 
        let currentAudio = null;

        function playRandomBGM() {
            stopBGM(); 
            const randomIndex = Math.floor(Math.random() * bgmList.length);
            currentAudio = new Audio(bgmList[randomIndex]);
            currentAudio.loop = true; // [추가] 선생님이 대기하실 때를 대비해 BGM 반복 재생
            currentAudio.play().catch(e => console.log("오디오 재생 권한 에러:", e));
        }

        function stopBGM() {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
        }

        function triggerRevealAnimation() {
            const displayText = document.getElementById('host-display-text');
            displayText.classList.remove('reveal-animation');
            void displayText.offsetWidth; 
            displayText.classList.add('reveal-animation');
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('role') === 'player') showScreen('player-screen');
        };

        function showScreen(screenId) {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function createCustomGame() {
            totalTeamsConfig = document.getElementById('setup-teams').value;
            const text = document.getElementById('setup-questions').value;
            const questions = text.split('\n').map(q => q.trim()).filter(q => q.length > 0);
            
            if (questions.length === 0) return alert("문제를 최소 1개 이상 입력해주세요!");
            socket.emit('createGame', { teams: totalTeamsConfig, questions });
            
            document.getElementById('host-setup').classList.add('hidden');
            document.getElementById('host-lobby').classList.remove('hidden');
            renderLobbyGrid([]); 
        }

        function nextState() { socket.emit('nextState'); }

        socket.on('gameCreated', (teams) => {
            totalTeamsConfig = teams;
            document.getElementById('next-btn').classList.remove('hidden');
            const playerUrl = window.location.origin + "?role=player";
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(playerUrl)}`;
            document.getElementById('qr-code-display').innerHTML = `
                <img src="${qrApiUrl}" alt="참가자 접속용 QR코드" style="border: 2px solid #4CAF50; padding: 10px; border-radius: 10px;">
                <p style="font-size: 14px; color: #666;">수동 접속 주소: <strong>${playerUrl}</strong></p>
            `;
        });

        socket.on('updateLobby', (players) => { renderLobbyGrid(players); });

        function renderLobbyGrid(players) {
            const container = document.getElementById('lobby-grid-container');
            container.innerHTML = "";
            for (let i = 1; i <= totalTeamsConfig; i++) {
                const teamDiv = document.createElement('div');
                teamDiv.className = 'team-box';
                teamDiv.innerHTML = `<h3>${i}조</h3>`;
                const grid = document.createElement('div');
                grid.className = 'team-grid';

                for (let s = 0; s < 4; s++) {
                    const slotDiv = document.createElement('div');
                    slotDiv.className = 'slot';
                    slotDiv.dataset.team = i; slotDiv.dataset.slot = s;
                    slotDiv.ondragover = (e) => e.preventDefault();
                    slotDiv.ondrop = handleDrop;

                    const p = players.find(p => p.team == i && p.slot == s);
                    if (p) {
                        const badge = document.createElement('div');
                        badge.className = 'player-badge'; badge.draggable = true; badge.innerText = p.name;
                        badge.ondragstart = (e) => {
                            e.dataTransfer.setData('playerId', p.id); e.dataTransfer.setData('team', p.team);
                        };
                        slotDiv.appendChild(badge);
                    } else {
                        slotDiv.innerHTML = `<span style="color:#ccc; font-size:12px;">빈 자리</span>`;
                    }
                    grid.appendChild(slotDiv);
                }
                teamDiv.appendChild(grid); container.appendChild(teamDiv);
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const playerId = e.dataTransfer.getData('playerId');
            const fromTeam = e.dataTransfer.getData('team');
            const targetSlotDiv = e.target.closest('.slot');
            if (!targetSlotDiv) return;

            if (fromTeam !== targetSlotDiv.dataset.team) return alert("같은 조 안에서만 자리를 이동할 수 있습니다.");
            socket.emit('changePlayerSlot', { playerId, newSlot: parseInt(targetSlotDiv.dataset.slot) });
        }

        socket.on('updateHostScreen', (data) => {
            document.getElementById('host-lobby').classList.add('hidden');
            document.getElementById('host-game-view').classList.remove('hidden');
            const displayText = document.getElementById('host-display-text');
            const resultsView = document.getElementById('host-results-view');
            const timerUI = document.getElementById('cute-timer-ui');
            
            if (data.state === 'Q_NUM') {
                displayText.innerText = `${data.qIndex + 1}번 문제`;
                timerUI.classList.add('hidden');
                resultsView.classList.add('hidden');
                resultsView.innerHTML = ""; 
                clearInterval(countdownInterval); 
                
                // [변경] BGM 시작 시점을 'X번 문제' 등장 시로 변경
                playRandomBGM(); 
                triggerRevealAnimation();

            } else if (data.state === 'Q_TEXT') {
                displayText.innerText = data.questionText;
                resultsView.classList.add('hidden'); 
                
                if (data.timerState === 'PREP') {
                    timerUI.classList.add('hidden');
                    // 효과음 없이 글자 쾅! 애니메이션만 유지
                    triggerRevealAnimation();
                }
            } else if (data.state === 'RESULT') {
                displayText.innerText = "정답 확인!";
                timerUI.classList.add('hidden');
                resultsView.classList.remove('hidden'); 
                
                clearInterval(countdownInterval);
                stopBGM(); 
                
                triggerRevealAnimation();
                renderResults(data.players, resultsView, data.maxTeams);
            }
        });

        socket.on('updateScores', (players) => {
            const resultsView = document.getElementById('host-results-view');
            if (!document.getElementById('host-game-view').classList.contains('hidden') && 
                document.getElementById('host-display-text').innerText === "정답 확인!") {
                renderResults(players, resultsView, totalTeamsConfig);
            }
        });

        socket.on('startTimer', (seconds) => {
            const timerUI = document.getElementById('cute-timer-ui');
            const timerText = document.getElementById('cute-timer-text');
            const barFill = document.getElementById('cute-bar-fill');
            
            timerUI.classList.remove('hidden'); 
            // [변경] 이미 BGM이 재생 중이므로 여기서 음악을 다시 틀지 않습니다.
            
            let timeLeft = seconds;
            timerText.innerText = `⏳ 남은 시간: ${timeLeft}초`;
            timerText.classList.remove('shake');
            barFill.style.background = "linear-gradient(90deg, #4facfe 0%, #00f2fe 100%)"; 
            barFill.style.width = "100%";

            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    timerText.innerText = `⏳ 남은 시간: ${timeLeft}초`;
                    barFill.style.width = `${(timeLeft / seconds) * 100}%`;
                    
                    if (timeLeft <= 3) { 
                        timerText.classList.add('shake');
                        barFill.style.background = "linear-gradient(90deg, #ff416c, #ff4b2b)"; 
                    }
                } else {
                    clearInterval(countdownInterval);
                }
            }, 1000);
        });

        socket.on('endTimer', () => {
            clearInterval(countdownInterval);
            stopBGM(); 
            document.getElementById('cute-timer-text').innerText = "⏰ 입력 시간 종료!";
            document.getElementById('cute-timer-text').classList.remove('shake');
            document.getElementById('cute-bar-fill').style.width = "0%";
        });

        function changeScore(type, target, delta) {
            socket.emit('changeScore', { type, target, delta });
        }

        function renderResults(players, container, maxTeams) {
            container.innerHTML = ""; 
            const colors = ['#FFD1DC', '#FFB347', '#AEC6CF', '#77DD77', '#E6E6FA'];
            const answerCounts = {}; 
            const answerColorMap = {}; 
            let colorIdx = 0;

            players.forEach(p => {
                const ans = (p.answer || "").trim();
                if (ans) answerCounts[ans] = (answerCounts[ans] || 0) + 1;
            });

            for (const ans in answerCounts) {
                if (answerCounts[ans] >= 2) { answerColorMap[ans] = colors[colorIdx % colors.length]; colorIdx++; }
            }

            for (let i = 1; i <= maxTeams; i++) {
                const teamPlayers = players.filter(p => p.team == i);
                
                let teamScore = 0;
                teamPlayers.forEach(p => teamScore += (p.score || 0));

                const teamDiv = document.createElement('div');
                teamDiv.className = 'team-box';
                
                teamDiv.innerHTML = `
                    <div class="team-header">
                        <h3>${i}조 <span style="color:#e91e63; font-size:14px;">(${teamScore}점)</span></h3>
                        <div>
                            <button class="score-btn" onclick="changeScore('team', ${i}, 1)">+</button><button class="score-btn" onclick="changeScore('team', ${i}, -1)">-</button>
                        </div>
                    </div>
                `;
                
                const grid = document.createElement('div');
                grid.className = 'team-grid';

                for (let s = 0; s < 4; s++) {
                    const slotDiv = document.createElement('div');
                    slotDiv.className = 'slot';
                    const p = teamPlayers.find(p => p.slot == s);
                    
                    if (p) {
                        const ans = (p.answer || "").trim();
                        const bgColor = answerColorMap[ans] || 'transparent';
                        const borderStyle = bgColor === 'transparent' ? 'border: 1px solid #ccc;' : 'border: 1px solid transparent;';
                        
                        slotDiv.style.backgroundColor = bgColor;
                        slotDiv.style.cssText += borderStyle;
                        
                        slotDiv.innerHTML = `
                            <div class="ans-name">
                                <span>${p.name} <span style="color:#e91e63;">${p.score || 0}</span></span>
                                <span>
                                    <button class="score-btn" onclick="changeScore('player', '${p.id}', 1)">+</button><button class="score-btn" onclick="changeScore('player', '${p.id}', -1)">-</button>
                                </span>
                            </div>
                            <div class="ans-text">${ans || '미제출'}</div>
                        `;
                    } else {
                        slotDiv.innerHTML = `<span style="color:#eee; font-size:12px;">공석</span>`;
                    }
                    grid.appendChild(slotDiv);
                }
                teamDiv.appendChild(grid); 
                container.appendChild(teamDiv);
            }
        }

        /* --- 참가자용 함수 --- */
        function joinGame() {
            const team = document.getElementById('team-num').value;
            const name = document.getElementById('player-name').value;
            if(!team || !name) return alert("모둠 번호와 이름을 모두 입력해주세요!");
            socket.emit('joinGame', { team, name });
        }

        socket.on('joinError', (msg) => { alert(msg); });

        function submitAnswer() {
            const answer = document.getElementById('player-answer').value;
            if(!answer) return alert("정답을 입력해주세요!");
            socket.emit('submitAnswer', answer);
            document.getElementById('submit-status').innerText = `"${answer}" 제출 완료!`;
        }

        socket.on('joinSuccess', () => {
            document.getElementById('player-lobby').classList.add('hidden');
            document.getElementById('player-game-view').classList.remove('hidden');
        });

        socket.on('updatePlayerScreen', (data) => {
            const statusText = document.getElementById('player-status-text');
            const answerArea = document.getElementById('answer-area');

            if (data.state === 'Q_NUM') {
                statusText.innerText = "화면을 보고 문제를 확인하세요!";
                answerArea.classList.add('hidden');
                document.getElementById('submit-status').innerText = "";
                document.getElementById('player-answer').value = ""; 
            } else if (data.state === 'Q_TEXT_PREP') {
                statusText.innerText = "👀 문제를 읽고 대기하세요!";
                answerArea.classList.add('hidden');
            } else if (data.state === 'Q_TEXT_INPUT') {
                statusText.innerText = "✍️ 지금 정답을 입력하세요! (10초)";
                answerArea.classList.remove('hidden'); 
            } else if (data.state === 'Q_TEXT_END') {
                statusText.innerText = "⏰ 입력이 마감되었습니다!";
                answerArea.classList.add('hidden');
            } else if (data.state === 'RESULT') {
                statusText.innerText = "화면에서 결과를 확인하세요!";
                answerArea.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
