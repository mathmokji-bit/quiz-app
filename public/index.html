<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 모둠 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; margin-top: 30px; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px;}
        input { padding: 10px; font-size: 16px; margin: 5px; }
        .hidden { display: none !important; }
        #host-display-text { font-size: 3em; margin: 40px 0; }
        .team-box { border: 2px solid #ccc; margin: 10px; padding: 10px; display: inline-block; vertical-align: top; width: 200px; }
        .answer-tag { display: block; margin: 5px; padding: 5px; border-radius: 5px; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🎯 실시간 단답형 퀴즈 게임</h1>

    <div id="intro-screen">
        <button onclick="showScreen('host-screen')">👨‍🏫 출제자로 방 만들기</button>
        <button onclick="showScreen('player-screen')">🙋‍♂️ 참가자로 접속하기</button>
    </div>

<div id="host-screen" class="hidden">
        <h2>[출제자 화면]</h2>

        <div id="host-setup" style="border: 2px dashed #4CAF50; padding: 20px; margin-bottom: 20px;">
            <h3>⚙️ 퀴즈 설정</h3>
            모둠 개수: <input type="number" id="setup-teams" value="4" min="1" style="width: 60px;"> 개 <br><br>
            문제 입력 (엔터키로 줄바꿈하여 여러 문제를 입력하세요. 최대 30개):<br>
            <textarea id="setup-questions" rows="6" style="width: 80%; margin-top: 10px; font-size: 16px;" placeholder="예: 베스킨라빈스 31 게임에서 픽해야 하는 필승 숫자는?&#13;&#10;삼각형의 내각의 합은?"></textarea><br>
            <button onclick="createCustomGame()" style="background-color: #2196F3;">설정 완료 및 방 만들기</button>
        </div>

        <button id="next-btn" onclick="nextState()" class="hidden" style="background-color: #ff9800; padding: 15px 30px; font-weight: bold;">게임 시작 / 다음 화면 ➡️</button>

        <div id="host-lobby" class="hidden">
            <h3 id="room-code-display" style="color: blue;"></h3>
            <p>참가자 대기 명단:</p>
            <ul id="player-list"></ul>
        </div>
        
        <div id="host-game-view" class="hidden">
            <h1 id="host-display-text"></h1>
            <div id="host-results-view"></div>
        </div>
    </div>


    <div id="player-screen" class="hidden">
        <h2>[참가자 화면]</h2>
        <div id="player-lobby">
            <input type="text" id="room-code" placeholder="방 코드 4자리"><br>
            <input type="number" id="team-num" placeholder="모둠 번호 (예: 1)"><br>
            <input type="text" id="player-name" placeholder="참가자 이름"><br>
            <button onclick="joinGame()">입장하기</button>
            <h3 id="join-status" style="color: green;"></h3>
        </div>

        <div id="player-game-view" class="hidden">
            <h2 id="player-status-text">호스트의 진행을 기다려주세요...</h2>
            <div id="answer-area" class="hidden">
                <input type="text" id="player-answer" placeholder="정답을 입력하세요">
                <button onclick="submitAnswer()">제출</button>
                <p id="submit-status" style="color: blue;"></p>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myRoomCode = "";

        function showScreen(screenId) {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        /* --- 출제자용 함수 --- */
        // 설정 창에서 입력한 데이터를 서버로 보내 방을 만듭니다.
        function createCustomGame() {
            const teams = document.getElementById('setup-teams').value;
            const text = document.getElementById('setup-questions').value;
            
            // 엔터 단위로 쪼개고 빈 줄은 제외하여 배열로 만듭니다.
            const questions = text.split('\n').map(q => q.trim()).filter(q => q.length > 0);
            
            if (questions.length === 0) {
                alert("문제를 최소 1개 이상 입력해주세요!");
                return;
            }
            if (questions.length > 30) {
                alert("문제는 최대 30개까지만 출제할 수 있습니다.");
                return;
            }

            // 서버로 설정값(모둠 수, 문제 배열)을 보냅니다.
            socket.emit('createGame', { teams, questions });
            
            // 방이 생성되었으니 설정 창은 숨기고, 로비(코드 및 대기명단)를 보여줍니다.
            document.getElementById('host-setup').classList.add('hidden');
            document.getElementById('host-lobby').classList.remove('hidden');
        }

        function nextState() {
            socket.emit('nextState', myRoomCode);
        }

        socket.on('gameCreated', (code) => {
            myRoomCode = code;
            document.getElementById('room-code-display').innerText = `접속 코드: ${code}`;
            document.getElementById('next-btn').classList.remove('hidden');
        });

        socket.on('playerJoined', (name) => {
            const list = document.getElementById('player-list');
            const li = document.createElement('li');
            li.innerText = name + ' 님이 입장했습니다.';
            list.appendChild(li);
        });

        // 서버에서 상태가 바뀔 때마다 출제자 화면 업데이트
        socket.on('updateHostScreen', (data) => {
            document.getElementById('host-lobby').classList.add('hidden');
            document.getElementById('host-game-view').classList.remove('hidden');
            const displayText = document.getElementById('host-display-text');
            const resultsView = document.getElementById('host-results-view');
            
            resultsView.innerHTML = ""; // 이전 결과 지우기

            if (data.state === 'Q_NUM') {
                displayText.innerText = `${data.qIndex + 1}번 문제`;
            } else if (data.state === 'Q_TEXT') {
                displayText.innerText = data.questionText;
            } else if (data.state === 'RESULT') {
                displayText.innerText = "정답 확인!";
                renderResults(data.players, resultsView);
            }
        });

      // 모둠별 정답 색칠 로직 (중복 답안에만 색상 부여)
        function renderResults(players, container) {
            const colors = ['#FFD1DC', '#FFB347', '#AEC6CF', '#77DD77', '#E6E6FA'];
            const answerCounts = {}; // 답안별 개수를 저장할 주머니
            const answerColorMap = {}; // 중복 답안에 부여할 색상표
            let colorIdx = 0;

            // 1. 모든 참가자의 답안 빈도수 세기
            players.forEach(p => {
                const ans = (p.answer || "").trim();
                if (ans) {
                    answerCounts[ans] = (answerCounts[ans] || 0) + 1;
                }
            });

            // 2. 2명 이상이 동일하게 적은 답안에만 색상 지정하기
            for (const ans in answerCounts) {
                if (answerCounts[ans] >= 2) {
                    answerColorMap[ans] = colors[colorIdx % colors.length];
                    colorIdx++;
                }
            }

            // 3. 임시로 1~4모둠까지만 화면에 표시
            for (let i = 1; i <= 4; i++) {
                const teamPlayers = players.filter(p => p.team == i);
                if (teamPlayers.length > 0) {
                    const teamDiv = document.createElement('div');
                    teamDiv.className = 'team-box';
                    teamDiv.innerHTML = `<h3>${i}조</h3>`;
                    
                    teamPlayers.forEach(p => {
                        const ans = (p.answer || "").trim();
                        
                        // 중복 답안이면 지정된 색상, 혼자 적은 답이면 배경색 없음(transparent)
                        const bgColor = answerColorMap[ans] || 'transparent';
                        
                        // 배경색이 없을 때는 옅은 회색 테두리를 주어 텍스트가 허전해 보이지 않게 처리
                        const borderStyle = bgColor === 'transparent' ? 'border: 1px solid #ccc;' : 'border: 1px solid transparent;';

                        teamDiv.innerHTML += `<span class="answer-tag" style="background-color: ${bgColor}; ${borderStyle}">${p.name}: ${ans || '미제출'}</span>`;
                    });
                    container.appendChild(teamDiv);
                }
            }
        }

        /* --- 참가자용 함수 --- */
        function joinGame() {
            myRoomCode = document.getElementById('room-code').value.toUpperCase();
            const team = document.getElementById('team-num').value;
            const name = document.getElementById('player-name').value;
            socket.emit('joinGame', { code: myRoomCode, team, name });
        }

        function submitAnswer() {
            const answer = document.getElementById('player-answer').value;
            socket.emit('submitAnswer', { code: myRoomCode, answer });
            document.getElementById('submit-status').innerText = `"${answer}" 제출 완료!`;
        }

        socket.on('joinSuccess', () => {
            document.getElementById('player-lobby').classList.add('hidden');
            document.getElementById('player-game-view').classList.remove('hidden');
        });

        // 서버에서 상태가 바뀔 때마다 참가자 화면 업데이트
        socket.on('updatePlayerScreen', (data) => {
            const statusText = document.getElementById('player-status-text');
            const answerArea = document.getElementById('answer-area');

            if (data.state === 'Q_NUM') {
                statusText.innerText = "문제를 확인하세요!";
                answerArea.classList.add('hidden');
                document.getElementById('submit-status').innerText = "";
                document.getElementById('player-answer').value = ""; // 입력창 초기화
            } else if (data.state === 'Q_TEXT') {
                statusText.innerText = "정답을 입력해주세요!";
                answerArea.classList.remove('hidden'); // 답안 입력창 보이기
            } else if (data.state === 'RESULT') {
                statusText.innerText = "화면에서 결과를 확인하세요!";
                answerArea.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
